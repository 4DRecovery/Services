name: Purge GitHub Pages Cache

on:
  push:
    branches:
      - main  # Change to your default branch if not "main"

jobs:
  purge_cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Touch a file to force update
        run: touch cache_buster.txt && git add cache_buster.txt && git commit -m "Cache Bust" && git push
